name: 🏷️ Unrecognised parcel status
description: An integration logged a warning asking you to report an unrecognised status or event.
title: "[status] "
labels: ["unrecognised-status"]
body:
  - type: markdown
    attributes:
      value: |
        The integration logs a line such as
        `[parcel] statusPhase.message=… → reported as 'unknown'` or
        `[history] observationCode=… / eventType=…`.
        Paste that full line below and we'll add it to the mapping.
  - type: dropdown
    id: integration
    attributes:
      label: Which integration?
      options:
        - DHL
        - PostNL
        - DPD
        - GLS
        - Other
    validations:
      required: true
  - type: textarea
    id: logline
    attributes:
      label: The log line
      description: Copy the full "help us map it" warning line from your Home Assistant log.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: e.g. 4.5.0
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.7.0
