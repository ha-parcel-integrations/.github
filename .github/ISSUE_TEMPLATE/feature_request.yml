name: 💡 Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: input
    id: project
    attributes:
      label: Which project?
      description: The integration or card this is about (or "new" for a new one).
      placeholder: e.g. ha-parcel-aggregator
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature and the problem it solves for you.
    validations:
      required: true
