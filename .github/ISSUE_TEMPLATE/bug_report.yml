name: 🐛 Bug report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: input
    id: project
    attributes:
      label: Which project?
      description: The integration or card this is about.
      placeholder: e.g. ha-postnl
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any related entries from your Home Assistant log.
      render: text
  - type: input
    id: version
    attributes:
      label: Project version
      placeholder: e.g. 4.5.0
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.7.0
    validations:
      required: true
